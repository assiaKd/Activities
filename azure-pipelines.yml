# azure-pipelines.yml

# Trigger pipeline on pushes and PRs to main branch
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

# Use Microsoft-hosted build agent
pool:
  vmImage: 'windows-latest'

# Global variables
variables:
  buildConfiguration: 'Release'

# Steps to run
steps:
# 1️⃣ Checkout the repo
- checkout: self

# 2️⃣ Install .NET SDK
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'
    includePreviewVersions: true

# 3️⃣ Restore NuGet packages
- task: DotNetCoreCLI@2
  displayName: 'Restore NuGet packages'
  inputs:
    command: 'restore'
    projects: '**/*.sln'

# 4️⃣ Build the solution
- task: DotNetCoreCLI@2
  displayName: 'Build solution'
  inputs:
    command: 'build'
    projects: '**/*.sln'
    arguments: '--configuration $(buildConfiguration) --no-restore'

# 5️⃣ Run unit tests (if any)
- task: DotNetCoreCLI@2
  displayName: 'Run unit tests'
  inputs:
    command: 'test'
    projects: '**/*Tests/*.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore --collect:"Code Coverage"'

# 6️⃣ Optional: publish build artifacts (binaries)
- task: PublishBuildArtifacts@1
  displayName: 'Publish build artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'